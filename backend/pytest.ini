[pytest]
testpaths = risk_module/tests
asyncio_mode = auto
markers =
    integration: marks tests that make live external API calls (deselect with -m 'not integration')

# Default: skip integration tests for fast feedback loops.
# Run all:          pytest
# Unit tests only:  pytest -m "not integration"
# Integration only: pytest -m integration
addopts = -v --tb=short
